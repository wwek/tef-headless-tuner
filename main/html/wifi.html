<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEF6686 Wi-Fi Setup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;max-width:480px;margin:0 auto;padding:12px}
a{color:#4ea8de}
h1{text-align:center;font-size:1.3em;padding:8px 0;border-bottom:1px solid #333}
.card{background:#16213e;border-radius:10px;padding:14px;margin:10px 0}
label{display:block;font-size:.85em;color:#aaa;margin:8px 0 4px}
input[type=text],input[type=password]{width:100%;background:#0f3460;color:#eee;border:1px solid #333;border-radius:6px;padding:8px;font-size:1em}
.btn{background:#0f3460;color:#eee;border:none;border-radius:6px;padding:10px 20px;font-size:1em;cursor:pointer;width:100%;margin-top:12px;transition:background .15s}
.btn:hover{background:#1a5276}
.btn:active{background:#0b2545}
.btn:disabled{opacity:.4;cursor:default}
.btn.secondary{background:#5a2832}
.btn.secondary:hover{background:#753745}
.btn.secondary:active{background:#421c24}
#msg{text-align:center;margin-top:10px;font-size:.95em;min-height:1.4em}
.info{text-align:center;color:#aaa;font-size:.85em;margin:6px 0}
.back{text-align:center;margin-top:16px}
.lang-btn{background:none;border:1px solid #444;color:#aaa;border-radius:4px;padding:2px 8px;font-size:.75em;cursor:pointer;float:right;margin-top:-2px}
.lang-btn:hover{border-color:#888;color:#eee}
</style>
</head>
<body>
<h1><span data-i18n="title">TEF6686 Wi-Fi Setup</span><button class="lang-btn" id="langbtn" onclick="toggleLang()">中文</button></h1>

<div class="card">
<div class="info" id="curmode">Mode: --</div>
<div class="info" id="curip">IP: --</div>
<div class="info" id="curap">Device AP: --</div>
</div>

<div class="card">
<label for="ssid" data-i18n="ssid">SSID</label>
<input type="text" id="ssid" autocomplete="off">
<label for="pass" data-i18n="password">Password</label>
<input type="password" id="pass">
<button class="btn" id="connectbtn" onclick="doConnect()" data-i18n="connect">Connect</button>
<button class="btn secondary" id="clearbtn" onclick="doClear()" data-i18n="clear">Clear Saved Wi-Fi</button>
<div id="msg"></div>
</div>

<div class="back" style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">
<a href="/" data-i18n="back">Back to Tuner</a>
<a href="/system" data-i18n="system">System</a>
</div>

<script>
const LANG={
en:{title:"TEF6686 Wi-Fi Setup",ssid:"SSID",password:"Password",connect:"Connect",clear:"Clear Saved Wi-Fi",back:"Back to Tuner",system:"System",lang_label:"中文",enter_ssid:"Enter SSID",connecting:"Validating and connecting...",connected:"Connected and saved. Device will switch to STA-only shortly.",restore:"Connection failed. Restoring the previous working Wi-Fi.",stay_ap:"Connection failed. Staying on device AP.",clearing:"Clearing saved Wi-Fi...",cleared:"Saved Wi-Fi cleared. Device will switch to AP-only.",failed:"Operation failed: ",mode_label:"Mode",ip_label:"IP",ap_label:"Device AP"},
zh:{title:"TEF6686 Wi-Fi 设置",ssid:"网络名称",password:"密码",connect:"连接",clear:"清除已保存 Wi-Fi",back:"返回调谐器",system:"系统",lang_label:"EN",enter_ssid:"请输入网络名称",connecting:"正在验证并尝试连接...",connected:"连接成功并已保存，设备即将切到仅 STA 模式。",restore:"连接失败，正在恢复上一组可用 Wi‑Fi。",stay_ap:"连接失败，设备将继续停留在自身 AP。",clearing:"正在清除已保存 Wi-Fi...",cleared:"已清除保存的 Wi‑Fi，设备即将回到 AP-only。",failed:"操作失败：",mode_label:"模式",ip_label:"IP",ap_label:"设备 AP"}
};

let curLang='en';
let currentWifiState=null;

function applyLang(code){
curLang=code;
const t=LANG[code]||LANG.en;
document.querySelectorAll('[data-i18n]').forEach(el=>{
const k=el.getAttribute('data-i18n');
if(t[k])el.textContent=t[k];
});
document.getElementById('langbtn').textContent=t.lang_label;
document.documentElement.lang=code==='zh'?'zh-CN':'en';
document.title=t.title;
localStorage.setItem('lang',code);
if(currentWifiState)renderWifiState(currentWifiState);
}

function toggleLang(){applyLang(curLang==='en'?'zh':'en')}

function setMsg(t,c){let m=document.getElementById('msg');m.textContent=t;m.style.color=c||'#eee'}

function setBusy(busy){
document.getElementById('connectbtn').disabled=busy;
document.getElementById('clearbtn').disabled=busy;
}

function renderWifiState(data){
const t=LANG[curLang]||LANG.en;
currentWifiState=data;
document.getElementById('curmode').textContent=t.mode_label+': '+(data.mode||'--');
document.getElementById('curip').textContent=t.ip_label+': '+(data.ip||location.hostname||'--');
document.getElementById('curap').textContent=t.ap_label+': '+(data.ap_ssid||'--');
}

async function loadWifiState(){
try{
let r=await fetch('/api/wifi');
if(!r.ok)throw new Error(r.statusText);
let data=await r.json();
renderWifiState(data);
}catch(_e){}
}

async function doConnect(){
const t=LANG[curLang]||LANG.en;
let ssid=document.getElementById('ssid').value.trim();
let pass=document.getElementById('pass').value;
if(!ssid){setMsg(t.enter_ssid,'#e94560');return}
setMsg(t.connecting,'#4ea8de');
setBusy(true);
try{
let r=await fetch('/api/wifi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid,password:pass})});
let data=await r.json().catch(()=>null);
if(!r.ok||!data)throw new Error(r.statusText);
renderWifiState(data);
setMsg(data.ok?t.connected:(data.rollback?t.restore:t.stay_ap),data.ok?'#2ecc71':'#f39c12');
setTimeout(loadWifiState,1500);
}catch(e){
setMsg(t.failed+e.message,'#e94560');
}finally{
setBusy(false);
}
}

async function doClear(){
const t=LANG[curLang]||LANG.en;
setMsg(t.clearing,'#4ea8de');
setBusy(true);
try{
let r=await fetch('/api/wifi/clear',{method:'POST'});
let data=await r.json().catch(()=>null);
if(!r.ok||!data)throw new Error(r.statusText);
renderWifiState(data);
document.getElementById('ssid').value='';
document.getElementById('pass').value='';
setMsg(t.cleared,'#2ecc71');
setTimeout(loadWifiState,1500);
}catch(e){
setMsg(t.failed+e.message,'#e94560');
}finally{
setBusy(false);
}
}

const saved=localStorage.getItem('lang');
const auto=navigator.language.startsWith('zh')?'zh':'en';
applyLang(saved||auto);
loadWifiState();
</script>
</body>
</html>
