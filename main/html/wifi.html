<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEF6686 Wi-Fi Setup</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;max-width:480px;margin:0 auto;padding:12px}
a{color:#4ea8de}
h1{text-align:center;font-size:1.3em;padding:8px 0;border-bottom:1px solid #333}
.card{background:#16213e;border-radius:10px;padding:14px;margin:10px 0}
label{display:block;font-size:.85em;color:#aaa;margin:8px 0 4px}
input[type=text],input[type=password]{width:100%;background:#0f3460;color:#eee;border:1px solid #333;border-radius:6px;padding:8px;font-size:1em}
.btn{background:#0f3460;color:#eee;border:none;border-radius:6px;padding:10px 20px;font-size:1em;cursor:pointer;width:100%;margin-top:12px;transition:background .15s}
.btn:hover{background:#1a5276}
.btn:active{background:#0b2545}
.btn:disabled{opacity:.4;cursor:default}
#msg{text-align:center;margin-top:10px;font-size:.95em;min-height:1.4em}
.info{text-align:center;color:#aaa;font-size:.85em;margin:6px 0}
.back{text-align:center;margin-top:16px}
.lang-btn{background:none;border:1px solid #444;color:#aaa;border-radius:4px;padding:2px 8px;font-size:.75em;cursor:pointer;float:right;margin-top:-2px}
.lang-btn:hover{border-color:#888;color:#eee}
</style>
</head>
<body>
<h1><span data-i18n="title">TEF6686 Wi-Fi Setup</span><button class="lang-btn" id="langbtn" onclick="toggleLang()">中文</button></h1>

<div class="card">
<div class="info" id="curmode">Mode: --</div>
<div class="info" id="curip">IP: --</div>
</div>

<div class="card">
<label for="ssid" data-i18n="ssid">SSID</label>
<input type="text" id="ssid" autocomplete="off">
<label for="pass" data-i18n="password">Password</label>
<input type="password" id="pass">
<button class="btn" id="connectbtn" onclick="doConnect()" data-i18n="connect">Connect</button>
<div id="msg"></div>
</div>

<div class="back"><a href="/" data-i18n="back">Back to Tuner</a></div>

<script>
const LANG={
en:{title:"TEF6686 Wi-Fi Setup",ssid:"SSID",password:"Password",connect:"Connect",back:"Back to Tuner",lang_label:"中文",enter_ssid:"Enter SSID",connecting:"Connecting...",saved:"Config saved. Reconnecting...",check:"Check if device is reachable at the new address.",failed:"Failed: "},
zh:{title:"TEF6686 Wi-Fi 设置",ssid:"网络名称",password:"密码",connect:"连接",back:"返回调谐器",lang_label:"EN",enter_ssid:"请输入网络名称",connecting:"正在连接...",saved:"配置已保存，正在重连...",check:"请检查设备在新地址是否可达。",failed:"连接失败："}
};

let curLang='en';

function applyLang(code){
curLang=code;
const t=LANG[code]||LANG.en;
document.querySelectorAll('[data-i18n]').forEach(el=>{
const k=el.getAttribute('data-i18n');
if(t[k])el.textContent=t[k];
});
document.getElementById('langbtn').textContent=t.lang_label;
document.documentElement.lang=code==='zh'?'zh-CN':'en';
document.title=t.title;
localStorage.setItem('lang',code);
}

function toggleLang(){applyLang(curLang==='en'?'zh':'en')}

function setMsg(t,c){let m=document.getElementById('msg');m.textContent=t;m.style.color=c||'#eee'}

function setMode(){
fetch('/api/status').then(r=>r.json()).then(d=>{
document.getElementById('curmode').textContent='Mode: AP+STA';
document.getElementById('curip').textContent='IP: '+location.hostname;
}).catch(()=>{});
}

async function doConnect(){
const t=LANG[curLang]||LANG.en;
let ssid=document.getElementById('ssid').value.trim();
let pass=document.getElementById('pass').value;
if(!ssid){setMsg(t.enter_ssid,'#e94560');return}
setMsg(t.connecting,'#4ea8de');
document.getElementById('connectbtn').disabled=true;
try{
let r=await fetch('/api/wifi',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ssid,password:pass})});
if(!r.ok)throw new Error(r.statusText);
setMsg(t.saved,'#2ecc71');
setTimeout(()=>setMsg(t.check,'#2ecc71'),5000);
}catch(e){
setMsg(t.failed+e.message,'#e94560');
document.getElementById('connectbtn').disabled=false;
}
}

const saved=localStorage.getItem('lang');
const auto=navigator.language.startsWith('zh')?'zh':'en';
applyLang(saved||auto);
setMode();
</script>
</body>
</html>
