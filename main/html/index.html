<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TEF6686 Tuner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;max-width:480px;margin:0 auto;padding:12px}
a{color:#4ea8de}
h1{text-align:center;font-size:1.3em;padding:8px 0;border-bottom:1px solid #333}
.card{background:#16213e;border-radius:10px;padding:14px;margin:10px 0}
.row{display:flex;align-items:center;gap:8px;margin:6px 0}
.row.center{justify-content:center}
.freq{font-size:2.8em;font-family:'Courier New',monospace;text-align:center;letter-spacing:2px;cursor:pointer;user-select:none;transition:text-shadow .3s}
.freq.seeking{animation:pulse 1s infinite}
.freq.tuned{text-shadow:0 0 8px rgba(46,204,113,.4)}
.freq .unit{font-size:.4em;color:#aaa;vertical-align:super}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.badge{display:inline-block;font-size:.55em;padding:2px 6px;border-radius:4px;vertical-align:middle;margin-left:6px;font-family:system-ui,sans-serif;letter-spacing:0}
.badge.stereo{background:#2ecc71;color:#000}
.badge.mono{background:#555;color:#ccc}
.band-label{font-size:.9em;color:#aaa;text-align:center;margin-top:-4px}
.bw-label{font-size:.8em;color:#888;text-align:center;margin-top:2px}
.btn{background:#0f3460;color:#eee;border:none;border-radius:6px;padding:8px 14px;font-size:.95em;cursor:pointer;min-width:44px;transition:background .15s}
.btn:hover{background:#1a5276}
.btn:active{background:#0b2545}
.btn.accent{background:#e94560}
.btn.accent:hover{background:#d63851}
.btn:disabled{opacity:.4;cursor:default}
.btn.muted-active{background:#e94560}
.btn.sm{padding:5px 10px;font-size:.82em;min-width:32px}
.btn.del{background:transparent;color:#e74c3c;padding:5px 8px;min-width:auto}
.btn.del:hover{background:#e74c3c22}
input[type=number],select{background:#0f3460;color:#eee;border:1px solid #333;border-radius:6px;padding:6px 8px;font-size:.95em;width:100%}
.meter{height:14px;background:#0a0a1a;border-radius:7px;overflow:hidden;flex:1}
.meter-fill{height:100%;border-radius:7px;transition:width .3s,background .3s}
.meter-label{min-width:64px;text-align:right;font-size:.85em}
.rds-ps{font-size:1.5em;text-align:center;font-family:'Courier New',monospace;letter-spacing:2px;min-height:1.6em;transition:color .3s}
.rds-ps.empty{color:#444}
.rds-rt{text-align:center;font-size:.9em;color:#ccc;min-height:1.2em;margin-top:4px}
.rds-info{display:flex;justify-content:center;gap:12px;font-size:.8em;color:#aaa;margin-top:4px;flex-wrap:wrap}
.rds-info span{background:#0f3460;padding:2px 6px;border-radius:4px}
.slider-row{display:flex;align-items:center;gap:8px}
.slider-row input[type=range]{flex:1;accent-color:#e94560}
.slider-row .val{min-width:28px;text-align:center}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.status-dot.on{background:#2ecc71}
.status-dot.off{background:#e74c3c}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.lang-btn{background:none;border:1px solid #444;color:#aaa;border-radius:4px;padding:2px 8px;font-size:.75em;cursor:pointer}
.lang-btn:hover{border-color:#888;color:#eee}
.wifi-link{font-size:.85em}
.footer{text-align:center;font-size:.7em;color:#555;margin-top:12px;padding:8px 0}
.preset-list{max-height:200px;overflow-y:auto;margin-top:8px}
.preset-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:#0a1628;margin:3px 0;cursor:pointer;transition:background .15s}
.preset-item:hover{background:#0f3460}
.preset-item .preset-freq{font-family:'Courier New',monospace;flex:1;font-size:.95em}
.preset-item .preset-band{font-size:.75em;color:#888;min-width:28px}
.preset-empty{color:#555;text-align:center;font-size:.85em;padding:10px 0}
.hidden{display:none!important}
.spectrum-card{padding:12px}
.spectrum-meta{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.spectrum-title{font-size:1em;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#c8f17b}
.spectrum-status{font-size:.78em;color:#9fb3c8;min-height:1.2em;font-family:'Courier New',monospace}
.spectrum-wrap{position:relative;overflow:hidden;border-radius:10px;border:1px solid rgba(136,216,79,.3);background:
radial-gradient(circle at top,#2b3547 0%,#161c26 35%,#0d1219 100%);
box-shadow:inset 0 0 0 1px rgba(255,255,255,.02)}
.spectrum-wrap.active{border-color:#88d84f;box-shadow:0 0 0 1px rgba(136,216,79,.14),inset 0 0 0 1px rgba(255,255,255,.03)}
.spectrum-toolbar{position:absolute;top:10px;right:10px;display:flex;gap:6px;z-index:2}
.spectrum-tool{width:34px;height:34px;min-width:34px;padding:0;border-radius:8px;border:1px solid rgba(136,216,79,.24);background:rgba(16,24,12,.78);backdrop-filter:blur(6px);font-size:.82em;font-weight:700;color:#bce96b}
.spectrum-tool:hover{background:#26391d}
.spectrum-tool.active{background:#88d84f;color:#071006;border-color:#88d84f}
.spectrum-wrap canvas{width:100%;height:228px;display:block;cursor:crosshair}
</style>
</head>
<body>
<h1><div class="header-row">
<span data-i18n="title">TEF6686 Tuner</span>
<div style="display:flex;align-items:center;gap:8px">
<button class="lang-btn" id="langbtn" onclick="toggleLang()">中文</button>
<span class="status-dot off" id="conn"></span>
</div>
</div></h1>

<div class="card">
<div class="freq" id="freq" onclick="focusFreqInput()">--.-<span class="unit">MHz</span></div>
<div class="band-label" id="band">FM</div>
<div class="bw-label" id="bwlabel"></div>
</div>

<div class="card">
<div class="row center">
<select id="bandsel"><option>FM</option><option>LW</option><option>MW</option><option>SW</option></select>
</div>
<div class="row center">
<button class="btn" onclick="repeatStart(stepFreq,-1)" ontouchstart="repeatStart(stepFreq,-1);event.preventDefault()" onmouseup="repeatStop()" onmouseleave="repeatStop()" ontouchend="repeatStop()" ontouchcancel="repeatStop()" data-i18n="step_dn">- Step</button>
<input type="number" id="freqin" placeholder="kHz">
<button class="btn" onclick="tuneInput()" data-i18n="tune">Tune</button>
<button class="btn" onclick="repeatStart(stepFreq,1)" ontouchstart="repeatStart(stepFreq,1);event.preventDefault()" onmouseup="repeatStop()" onmouseleave="repeatStop()" ontouchend="repeatStop()" ontouchcancel="repeatStop()" data-i18n="step_up">+ Step</button>
</div>
<div class="row center">
<button class="btn" id="seekdn" onclick="doSeek('DOWN')" data-i18n="seek_dn">Seek DN</button>
<button class="btn" id="seekup" onclick="doSeek('UP')" data-i18n="seek_up">Seek UP</button>
<button class="btn accent" onclick="seekStop()" data-i18n="stop">Stop</button>
</div>
</div>

<div class="card">
<div class="row">
<span class="meter-label" id="lv">--.- dBf</span>
<div class="meter"><div class="meter-fill" id="lbar" style="width:0%;background:#2ecc71"></div></div>
</div>
<div class="row">
<span class="meter-label" id="sv">-- dB</span>
<div class="meter"><div class="meter-fill" id="sbar" style="width:0%;background:#3498db"></div></div>
</div>
</div>

<div class="card hidden spectrum-card" id="spectrumcard">
<div class="spectrum-meta">
<span class="spectrum-title" data-i18n="spectrum">Spectrum</span>
<div class="spectrum-status" id="spectrumstatus"></div>
</div>
<div class="spectrum-wrap" id="spectrumwrap">
<div class="spectrum-toolbar">
<button class="btn spectrum-tool" id="spectrumautobtn" type="button" onclick="toggleSpectrumAuto()">A</button>
<button class="btn spectrum-tool" id="spectrumholdbtn" type="button" onclick="toggleSpectrumHold()">H</button>
<button class="btn spectrum-tool" id="spectrumbtn" type="button" onclick="scanSpectrum()">R</button>
</div>
<canvas id="spectrumcanvas"></canvas>
</div>
</div>

<div class="card" id="rdscard">
<div class="rds-ps empty" id="rdsps">--------</div>
<div class="rds-rt" id="rdsrt"></div>
<div class="rds-info">
<span id="rdspi">PI:----</span>
<span id="rdspty">PTY:-</span>
<span id="rdstp">TP</span>
<span id="rdsta">TA</span>
</div>
</div>

<div class="card">
<div class="slider-row">
<span data-i18n="vol">Vol</span>
<input type="range" id="vol" min="0" max="30" value="0" oninput="setVolume(this.value)">
<span class="val" id="volv">0</span>
</div>
<div class="row center">
<button class="btn" id="mutebtn" onclick="toggleMute()" data-i18n="mute">Mute</button>
<button class="btn accent" id="audiobtn" onclick="toggleAudio()" data-i18n="audio_play">Listen</button>
</div>
</div>

<div class="card" id="presetcard">
<div class="row center" style="margin-bottom:8px">
<span style="flex:1;font-weight:600" data-i18n="presets">Presets</span>
<button class="btn sm" onclick="savePreset()" data-i18n="save_preset">Save</button>
</div>
<div class="preset-list" id="presetlist"></div>
</div>

<div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap">
<a class="wifi-link" href="/wifi" data-i18n="wifi_settings">Wi-Fi Settings</a>
<a class="wifi-link" href="/system" data-i18n="system_settings">System</a>
</div>
<div class="footer" id="footer"></div>

<script>
let curFreq=0,curBand='FM',seeking=false,muted=false,tuned=false,stereo=false,curBw=0;
let repeatTimer=null;
let sse=null;
let tuneInFlight=false,tuneQueued=null,tuneLastSent=null;
let spectrum={active:false,status:'idle',scanId:0,start:0,end:0,step:100,total:0,points:[],holdPoints:[],drawReq:0,hoverIndex:-1,autoScale:true,hold:false};
const SPECTRUM_KEY='tef_spectrum_v2';

const LANG={
en:{title:"TEF6686 Tuner",step_dn:"- Step",step_up:"+ Step",tune:"Tune",seek_dn:"Seek DN",seek_up:"Seek UP",stop:"Stop",vol:"Vol",mute:"Mute",unmute:"Unmute",audio_play:"Listen",audio_stop:"Stop Audio",wifi_settings:"Wi-Fi Settings",system_settings:"System",lang_label:"中文",no_signal:"No Signal",stereo:"Stereo",mono:"Mono",presets:"Presets",save_preset:"Save",empty_presets:"No saved frequencies",spectrum:"Spectrum",scan_spectrum:"Rescan",spectrum_hint:"Run a scan to populate the graph",spectrum_ready:"Hover to inspect, tap to tune",spectrum_busy:"Spectrum scan in progress",spectrum_scanning:"Scanning",spectrum_error:"Spectrum scan failed",auto_scale:"Auto scale",hold_peaks:"Hold peaks"},
zh:{title:"TEF6686 调谐器",step_dn:"- 步进",step_up:"+ 步进",tune:"调谐",seek_dn:"向下搜台",seek_up:"向上搜台",stop:"停止",vol:"音量",mute:"静音",unmute:"取消静音",audio_play:"收听",audio_stop:"停止收听",wifi_settings:"Wi-Fi 设置",system_settings:"系统",lang_label:"EN",no_signal:"无信号",stereo:"立体声",mono:"单声道",presets:"收藏频率",save_preset:"保存",empty_presets:"暂无收藏频率",spectrum:"频谱",scan_spectrum:"重扫",spectrum_hint:"先扫描后显示频谱",spectrum_ready:"悬停查看，点击调谐",spectrum_busy:"频谱扫描进行中",spectrum_scanning:"正在扫描",spectrum_error:"频谱扫描失败",auto_scale:"自动标尺",hold_peaks:"峰值保持"}
};

let curLang='en';

function applyLang(code){
curLang=code;
const t=LANG[code]||LANG.en;
document.querySelectorAll('[data-i18n]').forEach(el=>{
const k=el.getAttribute('data-i18n');
if(t[k])el.textContent=t[k];
});
document.getElementById('langbtn').textContent=t.lang_label;
document.documentElement.lang=code==='zh'?'zh-CN':'en';
document.title=t.title;
localStorage.setItem('lang',code);
updateMuteBtn();
updateFreqDisplay();
renderPresets();
updateSpectrumUi();
requestSpectrumRender();
}

function toggleLang(){
applyLang(curLang==='en'?'zh':'en');
}

function fmtFreq(f,b){
if(b==='FM')return(f/1000).toFixed(1);
return f;
}
function stepSize(b){return b==='FM'?100:b==='SW'?5:9}
function freqUnit(b){return b==='FM'?'MHz':'kHz'}

function levelColor(pct){
if(pct<20)return'#e74c3c';
if(pct<45)return'#e67e22';
if(pct<70)return'#f1c40f';
return'#2ecc71';
}

async function api(path,body){
await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
}
async function flushTuneQueue(){
if(tuneInFlight||!tuneQueued)return;
const target=tuneQueued;
tuneQueued=null;
if(tuneLastSent&&tuneLastSent.freq===target.freq&&tuneLastSent.band===target.band)return;
tuneInFlight=true;
tuneLastSent=target;
try{
await api('/api/tune',target);
}catch(e){
tuneLastSent=null;
}finally{
tuneInFlight=false;
if(tuneQueued)setTimeout(flushTuneQueue,0);
}
}
function queueTune(f,b){
if(spectrum.active){setSpectrumStatus('busy');return;}
const freq=parseInt(f);
if(!freq||!b)return;
tuneQueued={freq,band:b};
flushTuneQueue();
}
function tune(f,b){
queueTune(f,b);
}
function seekStop(){api('/api/seekstop',{})}
function setVolume(v){document.getElementById('volv').textContent=v;api('/api/volume',{volume:+v})}

function loadSpectrum(){
try{
const saved=JSON.parse(localStorage.getItem(SPECTRUM_KEY)||'null');
if(!saved)return;
spectrum.autoScale=saved.autoScale!==false;
spectrum.hold=!!saved.hold;
spectrum.start=saved.start||0;
spectrum.end=saved.end||0;
spectrum.step=saved.step||100;
spectrum.total=saved.total||0;
spectrum.points=Array.isArray(saved.points)?saved.points.map(p=>Array.isArray(p)?{freq:p[0],level:p[1]}:null):[];
spectrum.holdPoints=Array.isArray(saved.holdPoints)?saved.holdPoints.map(p=>Array.isArray(p)?{freq:p[0],level:p[1]}:null):[];
if(spectrum.points.some(Boolean))spectrum.status='ready';
}catch(e){}
}

function storeSpectrum(){
localStorage.setItem(SPECTRUM_KEY,JSON.stringify({
autoScale:spectrum.autoScale,
hold:spectrum.hold,
start:spectrum.start,
end:spectrum.end,
step:spectrum.step,
total:spectrum.total,
points:spectrum.points.map(p=>p?[p.freq,p.level]:null),
holdPoints:spectrum.holdPoints.map(p=>p?[p.freq,p.level]:null)
}));
}

function spectrumRangeText(){
if(!spectrum.start||!spectrum.end)return'';
return fmtFreq(spectrum.start,'FM')+'-'+fmtFreq(spectrum.end,'FM')+' MHz';
}

function spectrumPointFrom(arr,idx){
return Array.isArray(arr)&&idx>=0&&idx<arr.length?arr[idx]:null;
}

function spectrumPoint(idx){
return spectrumPointFrom(spectrum.points,idx);
}

function findNearestSpectrumIndex(rawIdx){
const len=spectrum.points.length;
if(!len)return-1;
let idx=Math.max(0,Math.min(len-1,rawIdx));
if(spectrum.points[idx])return idx;
for(let d=1;d<len;d++){
const left=idx-d,right=idx+d;
if(left>=0&&spectrum.points[left])return left;
if(right<len&&spectrum.points[right])return right;
}
return-1;
}

function spectrumIndexFromClientX(clientX){
if(!spectrum.start||!spectrum.end)return-1;
const canvas=document.getElementById('spectrumcanvas');
const rect=canvas.getBoundingClientRect();
const left=42,right=Math.max(43,rect.width-16);
const inner=Math.max(1,right-left);
const x=Math.max(left,Math.min(right,clientX-rect.left));
const pct=(x-left)/inner;
const freq=spectrum.start+pct*(spectrum.end-spectrum.start);
const raw=Math.round((freq-spectrum.start)/Math.max(1,spectrum.step));
return findNearestSpectrumIndex(raw);
}

function spectrumTickStep(){
const span=(Math.max(spectrum.end,86000)-Math.min(spectrum.start,86000))/1000;
if(span<=12)return 1000;
if(span<=26)return 2000;
return 5000;
}

function spectrumScale(){
const points=spectrum.points.filter(Boolean);
const holds=spectrum.hold?spectrum.holdPoints.filter(Boolean):[];
const levels=points.concat(holds).map(p=>p.level);
if(!levels.length)return{min:0,max:60};
if(!spectrum.autoScale){
const top=Math.max(60,Math.ceil((Math.max.apply(null,levels)+2)/5)*5);
return{min:0,max:top};
}
let min=Math.floor((Math.min.apply(null,levels)-2)/4)*4;
let max=Math.ceil((Math.max.apply(null,levels)+2)/4)*4;
if(max-min<24){
const mid=(max+min)/2;
min=Math.floor(mid-12);
max=Math.ceil(mid+12);
}
return{min,max};
}

function spectrumResolveTunePoint(idx){
let best=spectrumPoint(idx);
if(!best)return null;
for(let i=Math.max(0,idx-2);i<=Math.min(spectrum.points.length-1,idx+2);i++){
const point=spectrumPoint(i);
if(point&&point.level>best.level+1.2)best=point;
}
return best;
}

function mergeHoldSpectrum(){
if(!spectrum.points.some(Boolean))return;
const first=spectrum.points.find(Boolean);
const last=[...spectrum.points].reverse().find(Boolean);
const holdFirst=spectrum.holdPoints.find(Boolean);
const holdLast=[...spectrum.holdPoints].reverse().find(Boolean);
const sameLayout=spectrum.holdPoints.length===spectrum.points.length
&&holdFirst&&last&&holdLast&&first
&&holdFirst.freq===first.freq
&&holdLast.freq===last.freq;
if(!sameLayout){
spectrum.holdPoints=spectrum.points.map(p=>p?{freq:p.freq,level:p.level}:null);
return;
}
spectrum.points.forEach((p,i)=>{
if(!p)return;
const hold=spectrum.holdPoints[i];
if(!hold||p.level>hold.level)spectrum.holdPoints[i]={freq:p.freq,level:p.level};
});
}

function setSpectrumStatus(status){
spectrum.status=status;
if(status!=='running')spectrum.hoverIndex=-1;
updateSpectrumUi();
requestSpectrumRender();
}

function toggleSpectrumAuto(){
spectrum.autoScale=!spectrum.autoScale;
storeSpectrum();
updateSpectrumUi();
requestSpectrumRender();
}

function toggleSpectrumHold(){
spectrum.hold=!spectrum.hold;
storeSpectrum();
updateSpectrumUi();
requestSpectrumRender();
}

function updateSpectrumUi(){
const t=LANG[curLang]||LANG.en;
const card=document.getElementById('spectrumcard');
const btn=document.getElementById('spectrumbtn');
const autoBtn=document.getElementById('spectrumautobtn');
const holdBtn=document.getElementById('spectrumholdbtn');
const wrap=document.getElementById('spectrumwrap');
const hover=spectrumPoint(spectrum.hoverIndex);
card.classList.toggle('hidden',curBand!=='FM');
btn.disabled=spectrum.active||curBand!=='FM';
btn.textContent=spectrum.active?'...':'R';
btn.title=t.scan_spectrum;
autoBtn.title=t.auto_scale;
holdBtn.title=t.hold_peaks;
btn.classList.toggle('active',spectrum.active);
autoBtn.classList.toggle('active',spectrum.autoScale);
holdBtn.classList.toggle('active',spectrum.hold);
wrap.classList.toggle('active',spectrum.active);
let text=spectrumRangeText();
if(hover&&!spectrum.active){
text=fmtFreq(hover.freq,'FM')+' MHz · '+hover.level.toFixed(1)+' dBf';
}else if(spectrum.active){
const done=spectrum.points.filter(Boolean).length;
const pct=spectrum.total?Math.max(1,Math.round(done*100/spectrum.total)):0;
text+=(text?' · ':'')+t.spectrum_scanning+' '+pct+'%';
}else if(spectrum.status==='error'){
text+=(text?' · ':'')+t.spectrum_error;
}else if(spectrum.status==='busy'){
text+=(text?' · ':'')+t.spectrum_busy;
}else if(spectrum.points.some(Boolean)){
text+=(text?' · ':'')+t.spectrum_ready;
}else{
text=t.spectrum_hint;
}
document.getElementById('spectrumstatus').textContent=text;
}

function requestSpectrumRender(){
if(spectrum.drawReq)return;
spectrum.drawReq=requestAnimationFrame(()=>{
spectrum.drawReq=0;
drawSpectrum();
});
}

function drawSpectrum(){
const canvas=document.getElementById('spectrumcanvas');
if(!canvas)return;
const rect=canvas.getBoundingClientRect();
if(!rect.width||!rect.height)return;
const dpr=window.devicePixelRatio||1;
const width=Math.max(1,Math.round(rect.width));
const height=Math.max(1,Math.round(rect.height));
if(canvas.width!==width*dpr||canvas.height!==height*dpr){
canvas.width=width*dpr;
canvas.height=height*dpr;
}
const ctx=canvas.getContext('2d');
ctx.setTransform(dpr,0,0,dpr,0,0);
ctx.clearRect(0,0,width,height);

const left=42,right=width-16,top=16,bottom=height-28;
const innerW=Math.max(1,right-left);
const innerH=Math.max(1,bottom-top);
ctx.fillStyle='#10161f';
ctx.fillRect(0,0,width,height);

const points=spectrum.points.filter(Boolean);
const holdPoints=spectrum.hold?spectrum.holdPoints.filter(Boolean):[];
if(!points.length){
ctx.fillStyle='#8aa0b4';
ctx.font='12px system-ui';
ctx.textAlign='center';
ctx.fillText((LANG[curLang]||LANG.en).spectrum_hint,width/2,height/2);
return;
}

const scale=spectrumScale();
const xForFreq=f=>left+((f-spectrum.start)/Math.max(1,spectrum.end-spectrum.start))*innerW;
const yForLevel=l=>bottom-((l-scale.min)/Math.max(1,scale.max-scale.min))*innerH;
const tickStep=spectrumTickStep();
const startTick=Math.ceil(spectrum.start/tickStep)*tickStep;
const gridColor='rgba(219,231,255,.18)';
const labelColor='#8bd64e';
const axisColor='rgba(88,126,164,.45)';
const strokeGradient=ctx.createLinearGradient(0,bottom,0,top);
strokeGradient.addColorStop(0,'#0048ff');
strokeGradient.addColorStop(0.35,'#1dde52');
strokeGradient.addColorStop(0.7,'#d6de00');
strokeGradient.addColorStop(1,'#ff2d00');
const fillGradient=ctx.createLinearGradient(0,bottom,0,top);
fillGradient.addColorStop(0,'rgba(0,72,255,.50)');
fillGradient.addColorStop(0.35,'rgba(29,222,82,.34)');
fillGradient.addColorStop(0.7,'rgba(214,222,0,.20)');
fillGradient.addColorStop(1,'rgba(255,45,0,.12)');

ctx.setLineDash([2,3]);
ctx.strokeStyle=gridColor;
ctx.lineWidth=1;
for(let i=0;i<=5;i++){
const value=scale.min+((scale.max-scale.min)/5)*i;
const y=yForLevel(value);
ctx.beginPath();
ctx.moveTo(left,y);
ctx.lineTo(right,y);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle=labelColor;
ctx.font='11px Courier New';
ctx.textAlign='right';
ctx.fillText(Math.round(value).toString(),left-8,y+4);
ctx.setLineDash([2,3]);
}
for(let freq=startTick;freq<=spectrum.end;freq+=tickStep){
const x=xForFreq(freq);
ctx.beginPath();
ctx.moveTo(x,top);
ctx.lineTo(x,bottom);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle=labelColor;
ctx.font='11px Courier New';
ctx.textAlign='center';
ctx.fillText(fmtFreq(freq,'FM'),x,bottom+16);
ctx.setLineDash([2,3]);
}
ctx.setLineDash([]);
ctx.strokeStyle=axisColor;
ctx.beginPath();
ctx.moveTo(left,bottom);
ctx.lineTo(right,bottom);
ctx.stroke();

function drawLine(series,color,widthPx){
let first=true;
ctx.beginPath();
series.forEach(point=>{
const x=xForFreq(point.freq);
const y=yForLevel(point.level);
if(first){ctx.moveTo(x,y);first=false;}
else ctx.lineTo(x,y);
});
ctx.strokeStyle=color;
ctx.lineWidth=widthPx;
ctx.lineJoin='round';
ctx.lineCap='round';
ctx.stroke();
}

if(holdPoints.length){
drawLine(holdPoints,'rgba(255,176,76,.75)',1.2);
}

ctx.beginPath();
points.forEach((point,i)=>{
const x=xForFreq(point.freq);
const y=yForLevel(point.level);
if(i===0)ctx.moveTo(x,y);
else ctx.lineTo(x,y);
});
ctx.lineTo(xForFreq(points[points.length-1].freq),bottom);
ctx.lineTo(xForFreq(points[0].freq),bottom);
ctx.closePath();
ctx.fillStyle=fillGradient;
ctx.fill();
drawLine(points,strokeGradient,2);

if(curFreq>=spectrum.start&&curFreq<=spectrum.end){
const x=xForFreq(curFreq);
ctx.fillStyle='rgba(140,190,255,.16)';
ctx.fillRect(x-4,top,8,bottom-top);
ctx.strokeStyle='rgba(196,228,255,.9)';
ctx.lineWidth=1.2;
ctx.beginPath();
ctx.moveTo(x,top);
ctx.lineTo(x,bottom);
ctx.stroke();
}

const peak=points.reduce((best,point)=>point.level>best.level?point:best,points[0]);
ctx.fillStyle='#ff6250';
ctx.beginPath();
ctx.arc(xForFreq(peak.freq),yForLevel(peak.level),3.2,0,Math.PI*2);
ctx.fill();

if(spectrum.hoverIndex>=0){
const hover=spectrumPoint(spectrum.hoverIndex);
if(hover){
const x=xForFreq(hover.freq);
const y=yForLevel(hover.level);
ctx.setLineDash([4,4]);
ctx.strokeStyle='rgba(255,255,255,.45)';
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(x,top);
ctx.lineTo(x,bottom);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(left,y);
ctx.lineTo(right,y);
ctx.stroke();
ctx.setLineDash([]);
ctx.fillStyle='#e8fff6';
ctx.beginPath();
ctx.arc(x,y,3.8,0,Math.PI*2);
ctx.fill();
const boxW=118,boxH=36;
let boxX=x+10;
if(boxX+boxW>right)boxX=x-boxW-10;
let boxY=Math.max(top+8,y-44);
if(boxY+boxH>bottom-4)boxY=bottom-boxH-4;
ctx.fillStyle='rgba(8,12,16,.88)';
ctx.strokeStyle='rgba(136,216,79,.55)';
ctx.lineWidth=1;
ctx.beginPath();
ctx.moveTo(boxX+8,boxY);
ctx.lineTo(boxX+boxW-8,boxY);
ctx.quadraticCurveTo(boxX+boxW,boxY,boxX+boxW,boxY+8);
ctx.lineTo(boxX+boxW,boxY+boxH-8);
ctx.quadraticCurveTo(boxX+boxW,boxY+boxH,boxX+boxW-8,boxY+boxH);
ctx.lineTo(boxX+8,boxY+boxH);
ctx.quadraticCurveTo(boxX,boxY+boxH,boxX,boxY+boxH-8);
ctx.lineTo(boxX,boxY+8);
ctx.quadraticCurveTo(boxX,boxY,boxX+8,boxY);
ctx.closePath();
ctx.fill();
ctx.stroke();
ctx.fillStyle='#d4f48c';
ctx.font='12px Courier New';
ctx.textAlign='left';
ctx.fillText(fmtFreq(hover.freq,'FM')+' MHz',boxX+8,boxY+14);
ctx.fillStyle='#e2edf7';
ctx.fillText(hover.level.toFixed(1)+' dBf',boxX+8,boxY+29);
}
}
}

function handleSpectrumPointer(e){
if(spectrum.active||curBand!=='FM'||!spectrum.points.some(Boolean))return;
const idx=spectrumIndexFromClientX(e.clientX);
if(idx===spectrum.hoverIndex)return;
spectrum.hoverIndex=idx;
updateSpectrumUi();
requestSpectrumRender();
}

function handleSpectrumLeave(){
if(spectrum.hoverIndex<0)return;
spectrum.hoverIndex=-1;
updateSpectrumUi();
requestSpectrumRender();
}

function handleSpectrumWheel(e){
if(spectrum.active||curBand!=='FM')return;
e.preventDefault();
const dir=e.deltaY>0?1:-1;
tune(curFreq+dir*stepSize(curBand),'FM');
}

function handleSpectrumClick(e){
if(spectrum.active||curBand!=='FM')return;
const idx=spectrum.hoverIndex>=0?spectrum.hoverIndex:spectrumIndexFromClientX(e.clientX);
const point=spectrumResolveTunePoint(idx);
if(point)tune(point.freq,'FM');
}

async function scanSpectrum(){
if(spectrum.active||curBand!=='FM')return;
setSpectrumStatus('running');
try{
const r=await fetch('/api/spectrum/scan',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
if(!r.ok){
setSpectrumStatus(r.status===409?'busy':'error');
return;
}
const d=await r.json();
updateSpectrumStatusEvent({state:'running',scan_id:d.scan_id,start:d.start,end:d.end,step:d.step,total:d.total});
}catch(err){
setSpectrumStatus('error');
}
}

function updateSpectrumStatusEvent(d){
if(d.state==='running'){
spectrum.active=true;
spectrum.status='running';
spectrum.hoverIndex=-1;
spectrum.scanId=d.scan_id||0;
spectrum.start=d.start||0;
spectrum.end=d.end||0;
spectrum.step=d.step||100;
spectrum.total=d.total||0;
spectrum.points=[];
}else{
if(d.scan_id&&spectrum.scanId&&d.scan_id!==spectrum.scanId)return;
spectrum.active=false;
spectrum.hoverIndex=-1;
if(d.state==='complete'){
mergeHoldSpectrum();
spectrum.status=spectrum.points.some(Boolean)?'ready':'idle';
storeSpectrum();
fetch('/api/status').then(r=>r.json()).then(v=>updateStatus(v)).catch(()=>{});
fetch('/api/quality').then(r=>r.json()).then(v=>updateQuality(v)).catch(()=>{});
}else if(d.state==='error'){
spectrum.status='error';
storeSpectrum();
fetch('/api/status').then(r=>r.json()).then(v=>updateStatus(v)).catch(()=>{});
fetch('/api/quality').then(r=>r.json()).then(v=>updateQuality(v)).catch(()=>{});
}
}
updateSpectrumUi();
requestSpectrumRender();
}

function updateSpectrumPoint(d){
if(!d||!d.scan_id||d.scan_id!==spectrum.scanId)return;
spectrum.points[d.index]={freq:d.freq,level:d.level};
if((d.index%8)===0)updateSpectrumUi();
requestSpectrumRender();
}

function updateMuteBtn(){
const btn=document.getElementById('mutebtn');
const t=LANG[curLang]||LANG.en;
btn.textContent=muted?t.unmute:t.mute;
btn.className='btn'+(muted?' muted-active':'');
}

function toggleMute(){muted=!muted;api('/api/mute',{mute:muted});updateMuteBtn()}

// --- Web Audio via WebSocket ---
let audioCtx=null,audioWs=null,audioNode=null,audioPlaying=false;

function updateAudioBtn(){
const btn=document.getElementById('audiobtn');
const t=LANG[curLang]||LANG.en;
btn.textContent=audioPlaying?t.audio_stop:t.audio_play;
btn.className='btn'+(audioPlaying?' muted-active':' accent');
}

async function createAudioWorkletSink(ctx){
const wk=new Blob([`
class PCMPlayer extends AudioWorkletProcessor{
constructor(){
super();
this.buf=new Float32Array(44100*2);
this.wr=0;this.rd=0;this.len=0;
this.port.onmessage=(e)=>{
const r=new Int16Array(e.data);
for(let i=0;i<r.length;i++){
if(this.len>=this.buf.length)break;
this.buf[this.wr]=r[i]/32768;
this.wr=(this.wr+1)%this.buf.length;
this.len++;
}
};
}
process(_,outs){
const n=outs[0][0].length;
for(let i=0;i<n;i++){
if(this.len<2){break;}
outs[0][0][i]=this.buf[this.rd];
outs[0][1][i]=this.buf[(this.rd+1)%this.buf.length];
this.rd=(this.rd+2)%this.buf.length;
this.len-=2;
}
return true;
}
}
registerProcessor('pcm-player',PCMPlayer);
`],{type:'application/javascript'});
const url=URL.createObjectURL(wk);
try{
await ctx.audioWorklet.addModule(url);
}finally{
URL.revokeObjectURL(url);
}
const node=new AudioWorkletNode(ctx,'pcm-player');
node.connect(ctx.destination);
return{
node,
push(data){node.port.postMessage(data,[data])},
close(){node.disconnect()}
};
}

function createScriptProcessorSink(ctx){
const node=ctx.createScriptProcessor(2048,0,2);
const buf=new Float32Array(44100*2);
let wr=0,rd=0,len=0;
node.onaudioprocess=(e)=>{
const left=e.outputBuffer.getChannelData(0);
const right=e.outputBuffer.getChannelData(1);
for(let i=0;i<left.length;i++){
if(len<2){
left[i]=0;
right[i]=0;
continue;
}
left[i]=buf[rd];
right[i]=buf[(rd+1)%buf.length];
rd=(rd+2)%buf.length;
len-=2;
}
};
node.connect(ctx.destination);
return{
node,
push(data){
const r=new Int16Array(data);
for(let i=0;i<r.length;i++){
if(len>=buf.length){
rd=(rd+2)%buf.length;
len-=2;
}
buf[wr]=r[i]/32768;
wr=(wr+1)%buf.length;
len++;
}
},
close(){node.disconnect()}
};
}

async function startAudio(){
try{
audioCtx=new (window.AudioContext||window.webkitAudioContext)({sampleRate:44100});
await audioCtx.resume();
audioNode=(audioCtx.audioWorklet&&window.AudioWorkletNode)
?await createAudioWorkletSink(audioCtx)
:createScriptProcessorSink(audioCtx);

audioWs=new WebSocket((location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/api/audio');
audioWs.binaryType='arraybuffer';
audioWs.onmessage=(e)=>{if(audioNode)audioNode.push(e.data);};
audioWs.onclose=()=>{stopAudio();};
audioWs.onerror=()=>{stopAudio();};

audioPlaying=true;
updateAudioBtn();
}catch(err){alert('Audio init failed: '+err.message);stopAudio();}
}

function stopAudio(){
audioPlaying=false;
if(audioWs){audioWs.onclose=null;audioWs.close();audioWs=null;}
if(audioNode){audioNode.close();audioNode=null;}
if(audioCtx){audioCtx.close();audioCtx=null;}
updateAudioBtn();
}

function toggleAudio(){audioPlaying?stopAudio():startAudio();}

function focusFreqInput(){
const inp=document.getElementById('freqin');
if(curFreq>0)inp.value=curFreq;
inp.focus();
inp.select();
}

function stepFreq(dir){
let f=curFreq+dir*stepSize(curBand);
tune(f,curBand);
}

function repeatStart(fn,arg){
fn(arg);
repeatTimer=setInterval(()=>fn(arg),350);
}
function repeatStop(){
if(repeatTimer){clearInterval(repeatTimer);repeatTimer=null}
}

function tuneInput(){
let f=parseInt(document.getElementById('freqin').value);
if(f)tune(f,document.getElementById('bandsel').value);
}
function doSeek(dir){
if(spectrum.active){setSpectrumStatus('busy');return;}
if(seeking)return;
api('/api/seek',{direction:dir,band:document.getElementById('bandsel').value});
}

function fmtBw(bw){
if(!bw)return'';
return'BW: '+bw+' kHz';
}

function updateFreqDisplay(){
const el=document.getElementById('freq');
let html=curFreq>0?fmtFreq(curFreq,curBand):'<span style="color:#555">'+(LANG[curLang]||LANG.en).no_signal+'</span>';
html+='<span class="unit">'+freqUnit(curBand)+'</span>';
if(tuned&&curBand==='FM'){
const t=LANG[curLang]||LANG.en;
html+='<span class="badge '+(stereo?'stereo':'mono')+'">'+(stereo?t.stereo:t.mono)+'</span>';
}
el.innerHTML=html;
el.className='freq'+(seeking?' seeking':'')+(tuned&&!seeking?' tuned':'');
document.getElementById('bwlabel').textContent=curBw>0?fmtBw(curBw):'';
}

function updateStatus(d){
if(spectrum.active){
updateSpectrumUi();
requestSpectrumRender();
return;
}
curFreq=d.freq;curBand=d.band;seeking=d.seeking;tuned=!!d.tuned;stereo=!!d.stereo;
document.getElementById('band').textContent=d.band;
document.getElementById('bandsel').value=d.band;
document.getElementById('seekup').disabled=seeking;
document.getElementById('seekdn').disabled=seeking;
updateFreqDisplay();
updateSpectrumUi();
requestSpectrumRender();
}
function updateQuality(d){
if(spectrum.active)return;
curBw=d.bw||0;
let lp=Math.min(100,Math.max(0,d.level));
document.getElementById('lbar').style.width=lp+'%';
document.getElementById('lbar').style.background=levelColor(lp);
document.getElementById('lv').textContent=d.level.toFixed(1)+' dBf';
let sp=Math.min(100,Math.max(0,d.snr*2));
document.getElementById('sbar').style.width=sp+'%';
document.getElementById('sv').textContent=d.snr+' dB';
document.getElementById('bwlabel').textContent=curBw>0?fmtBw(curBw):'';
}
function updateRDS(d){
if(spectrum.active)return;
const ps=document.getElementById('rdsps');
ps.textContent=d.ps||'--------';
ps.className='rds-ps'+(d.ps&&d.ps!=='--------'?'':' empty');
document.getElementById('rdsrt').textContent=d.rt||'';
document.getElementById('rdspi').textContent='PI:'+d.pi;
document.getElementById('rdspty').textContent='PTY:'+d.pty;
document.getElementById('rdstp').textContent=d.tp?'TP':'';
document.getElementById('rdsta').textContent=d.ta?'TA':'';
}

// --- Preset management ---
const PRESET_KEY='tef_presets';

function loadPresets(){
try{return JSON.parse(localStorage.getItem(PRESET_KEY))||[]}catch(e){return[]}
}
function storePresets(arr){
localStorage.setItem(PRESET_KEY,JSON.stringify(arr));
}

function savePreset(){
if(!curFreq||!curBand)return;
let presets=loadPresets();
let exists=presets.some(p=>p.band===curBand&&p.freq===curFreq);
if(exists)return;
presets.push({band:curBand,freq:curFreq,ts:Date.now()});
storePresets(presets);
renderPresets();
}

function deletePreset(idx){
let presets=loadPresets();
if(idx<0||idx>=presets.length)return;
presets.splice(idx,1);
storePresets(presets);
renderPresets();
}

function recallPreset(idx){
let presets=loadPresets();
let p=presets[idx];
if(p)tune(p.freq,p.band);
}

function renderPresets(){
const t=LANG[curLang]||LANG.en;
let presets=loadPresets();
let el=document.getElementById('presetlist');
el.innerHTML='';
if(!presets.length){
let empty=document.createElement('div');
empty.className='preset-empty';
empty.textContent=t.empty_presets;
el.appendChild(empty);
return;
}
presets.forEach((p,i)=>{
let div=document.createElement('div');
div.className='preset-item';
div.onclick=()=>recallPreset(i);
let bandSpan=document.createElement('span');
bandSpan.className='preset-band';
bandSpan.textContent=p.band;
div.appendChild(bandSpan);
let freqSpan=document.createElement('span');
freqSpan.className='preset-freq';
freqSpan.textContent=fmtFreq(p.freq,p.band)+' '+freqUnit(p.band);
div.appendChild(freqSpan);
let delBtn=document.createElement('button');
delBtn.className='btn del';
delBtn.innerHTML='&times;';
delBtn.title='Delete';
delBtn.onclick=(e)=>{e.stopPropagation();deletePreset(i)};
div.appendChild(delBtn);
el.appendChild(div);
});
}

function connectSSE(){
if(sse)return;
sse=new EventSource('/api/events');
sse.addEventListener('status',e=>{updateStatus(JSON.parse(e.data))});
sse.addEventListener('rds',e=>{updateRDS(JSON.parse(e.data))});
sse.addEventListener('quality',e=>{updateQuality(JSON.parse(e.data))});
sse.addEventListener('spectrum_status',e=>{updateSpectrumStatusEvent(JSON.parse(e.data))});
sse.addEventListener('spectrum_point',e=>{updateSpectrumPoint(JSON.parse(e.data))});
sse.onopen=()=>{document.getElementById('conn').className='status-dot on'};
sse.onerror=()=>{
document.getElementById('conn').className='status-dot off';
if(sse){sse.close();sse=null;}
setTimeout(()=>{if(!document.hidden)connectSSE();},3000);
};
}

function disconnectSSE(){
if(sse){
sse.close();
sse=null;
}
document.getElementById('conn').className='status-dot off';
}

const saved=localStorage.getItem('lang');
const auto=navigator.language.startsWith('zh')?'zh':'en';
loadSpectrum();
applyLang(saved||auto);
fetch('/api/status').then(r=>r.json()).then(d=>updateStatus(d)).catch(()=>{});
connectSSE();
fetch('/api/version').then(r=>r.json()).then(d=>{
document.getElementById('footer').textContent='v'+d.version+' ('+d.commit+'@'+d.branch+' '+d.date+')';
}).catch(()=>{});
document.getElementById('spectrumcanvas').addEventListener('pointermove',handleSpectrumPointer);
document.getElementById('spectrumcanvas').addEventListener('pointerleave',handleSpectrumLeave);
document.getElementById('spectrumcanvas').addEventListener('click',handleSpectrumClick);
document.getElementById('spectrumcanvas').addEventListener('wheel',handleSpectrumWheel,{passive:false});
window.addEventListener('resize',requestSpectrumRender);
document.addEventListener('visibilitychange',()=>{
if(document.hidden){
if(!spectrum.active)disconnectSSE();
stopAudio();
}
else{connectSSE();requestSpectrumRender();}
});
window.addEventListener('beforeunload',()=>{disconnectSSE();stopAudio();});
</script>
